<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e1b4b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c4b5fd"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>

  <!-- Subtle inner highlight on top -->
  <rect x="32" y="32" width="960" height="960" rx="200" ry="200"
        fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2"/>

  <!-- Terminal chevron > -->
  <g filter="url(#glow)">
    <path d="M 296 360 L 460 512 L 296 664"
          stroke="url(#accent)"
          stroke-width="72"
          stroke-linecap="round"
          stroke-linejoin="round"
          fill="none"/>

    <!-- Cursor block -->
    <rect x="500" y="616" width="232" height="56" rx="28" fill="url(#accent)"/>
  </g>
</svg>
